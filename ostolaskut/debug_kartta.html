<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Debug - Salon ostolaskut</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
body { margin: 0; font-family: monospace; font-size: 13px; }
#map { position: absolute; top: 0; left: 0; right: 400px; bottom: 0; }
#debug {
  position: absolute; top: 0; right: 0; width: 400px; bottom: 0;
  background: #1a1a1a; color: #e0e0e0;
  overflow-y: auto; padding: 12px;
}
.ok   { color: #4caf50; }
.fail { color: #f44336; }
.info { color: #ffc107; }
.dim  { color: #666; }
h3 { color: #aaa; margin: 10px 0 6px; font-size: 12px; text-transform: uppercase; }
pre { white-space: pre-wrap; word-break: break-all; font-size: 11px; background: #111; padding: 6px; border-radius: 4px; margin: 4px 0; }
</style>
</head>
<body>
<div id="map"></div>
<div id="debug"><h3>Debug-loki</h3><div id="log"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
var log = document.getElementById('log');
function L(msg, cls) {
  var d = document.createElement('div');
  d.className = cls || '';
  d.textContent = new Date().toTimeString().slice(0,8) + ' ' + msg;
  log.appendChild(d);
  log.scrollTop = log.scrollHeight;
}
function Lpre(label, obj) {
  var d = document.createElement('div');
  d.innerHTML = '<div class="info">' + label + '</div><pre>' + JSON.stringify(obj, null, 2).slice(0, 800) + '</pre>';
  log.appendChild(d);
  log.scrollTop = log.scrollHeight;
}

window.addEventListener('load', async function() {
  // 1. Leaflet OK?
  if (typeof L === 'function') { window.log('SKIP'); }
  L('Leaflet ladattu: ' + (typeof window.L !== 'undefined' ? 'OK' : 'EI'), typeof window.L !== 'undefined' ? 'ok' : 'fail');
  L('XLSX ladattu: ' + (typeof XLSX !== 'undefined' ? 'OK' : 'EI'), typeof XLSX !== 'undefined' ? 'ok' : 'fail');

  // 2. Kartta
  try {
    var map = window.L.map('map').setView([60.385, 23.129], 10);
    L('Kartta luotu OK', 'ok');
    window.L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: 'CARTO', subdomains: 'abcd'
    }).addTo(map);
    L('Karttapohja lisatty', 'ok');
    // Testipiste suoraan
    window.L.circleMarker([60.385, 23.129], { radius: 15, fillColor: 'red', color: '#fff', weight: 2, fillOpacity: 0.9 })
      .bindPopup('<b>Testipiste - Salo</b>')
      .addTo(map);
    L('Testipiste lisatty karttaan (Salon keskusta)', 'ok');
  } catch(e) {
    L('KARTTAVIRHE: ' + e.message, 'fail');
  }

  // 3. Excel-haku
  L('--- Testataan Excel-lataus ---', 'info');
  var url = 'https://avoindata.suomi.fi/data/dataset/36d08676-a7f9-4345-8ad3-028281ebc1cb/resource/937c24d0-6c32-4c23-ad12-e418ac0a6c42/download/salon-kaupungin-ostolaskut-ajalta-1.1.-31.12.2024.xlsx';
  try {
    var resp = await fetch(url);
    L('Excel fetch HTTP: ' + resp.status, resp.ok ? 'ok' : 'fail');
    if (resp.ok) {
      L('Ladataan sisalto...', 'info');
      var buf = await resp.arrayBuffer();
      L('ArrayBuffer koko: ' + (buf.byteLength/1024/1024).toFixed(1) + ' Mt', 'ok');
      var wb = XLSX.read(buf, { type: 'array' });
      L('Excel-taulukot: ' + wb.SheetNames.join(', '), 'ok');
      var ws = wb.Sheets[wb.SheetNames[0]];
      var rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
      L('Riveja: ' + rows.length, rows.length > 0 ? 'ok' : 'fail');
      if (rows.length > 0) {
        Lpre('Sarakkeet (1. rivi):', Object.keys(rows[0]));
        Lpre('Esimerkkirivi:', rows[0]);
      }
    }
  } catch(e) {
    L('Excel-virhe: ' + e.message, 'fail');
  }

  // 4. PRH-haku
  L('--- Testataan PRH ---', 'info');
  try {
    var pr = await fetch('https://avoindata.prh.fi/opendata-ytj-api/v3/companies?businessId=0112038-9');
    L('PRH HTTP: ' + pr.status, pr.ok ? 'ok' : 'fail');
    if (pr.ok) {
      var pd = await pr.json();
      Lpre('PRH vastaus:', pd.results && pd.results[0] ? {
        nimi: pd.results[0].names && pd.results[0].names[0] && pd.results[0].names[0].name,
        osoitteet: pd.results[0].addresses
      } : pd);
    }
  } catch(e) {
    L('PRH-virhe: ' + e.message, 'fail');
  }

  // 5. Photon
  L('--- Testataan Photon ---', 'info');
  try {
    var gr = await fetch('https://photon.komoot.io/api/?q=Salo+Finland&limit=1');
    L('Photon HTTP: ' + gr.status, gr.ok ? 'ok' : 'fail');
    if (gr.ok) {
      var gd = await gr.json();
      var f = gd.features && gd.features[0];
      if (f) L('Koordinaatit: ' + f.geometry.coordinates[1].toFixed(4) + ', ' + f.geometry.coordinates[0].toFixed(4), 'ok');
    }
  } catch(e) {
    L('Photon-virhe: ' + e.message, 'fail');
  }

  L('--- Testit valmis ---', 'info');
});
</script>
</body>
</html>
