<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salon kaupungin ostolaskut 2024</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.min.css"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: Arial, sans-serif; font-size: 14px; background: #f4f2ee; color: #1a1916; }
#shell { display: flex; flex-direction: column; height: 100vh; }
#topbar { background: #fff; border-bottom: 1px solid #ddd; padding: 0 16px; height: 50px; display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
#topbar h1 { font-size: 15px; font-weight: 600; white-space: nowrap; }
.pill { background: #f0ede8; border: 1px solid #ddd; border-radius: 20px; padding: 3px 10px; font-size: 12px; color: #555; white-space: nowrap; }
.spacer { flex: 1; }
#pbar { height: 3px; background: #e0ddd8; flex-shrink: 0; }
#pbar-inner { height: 100%; background: #2d5fa6; width: 0%; transition: width 0.3s; }
#body { display: flex; flex: 1; overflow: hidden; }
#sidebar { width: 220px; flex-shrink: 0; background: #fff; border-right: 1px solid #ddd; display: flex; flex-direction: column; overflow-y: auto; padding: 12px; gap: 14px; }
.sb-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; color: #999; margin-bottom: 6px; }
select { width: 100%; font-size: 13px; padding: 6px 8px; border: 1px solid #ddd; border-radius: 6px; background: #f8f7f5; color: #1a1916; }
.tog-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: #555; }
.tog { position: relative; width: 34px; height: 18px; flex-shrink: 0; }
.tog input { opacity: 0; width: 0; height: 0; position: absolute; }
.tog-track { position: absolute; inset: 0; background: #ccc; border-radius: 9px; cursor: pointer; transition: background 0.2s; }
.tog input:checked ~ .tog-track { background: #2d5fa6; }
.tog-thumb { position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; background: #fff; border-radius: 50%; transition: transform 0.2s; pointer-events: none; }
.tog input:checked ~ .tog-thumb { transform: translateX(16px); }
#leg { display: flex; flex-direction: column; gap: 4px; }
.leg-row { display: flex; align-items: center; gap: 7px; font-size: 12px; color: #444; cursor: pointer; padding: 2px 4px; border-radius: 4px; }
.leg-row:hover { background: #f0ede8; }
.leg-row.dim { opacity: 0.3; }
.leg-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
.leg-sizes { display: flex; align-items: center; gap: 6px; margin-top: 6px; font-size: 11px; color: #999; }
#map { flex: 1; }
#infobar { height: 26px; background: #fff; border-top: 1px solid #ddd; display: flex; align-items: center; padding: 0 16px; font-size: 11px; color: #888; flex-shrink: 0; }
#overlay { position: fixed; inset: 0; z-index: 9999; background: rgba(244,242,238,0.94); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; text-align: center; padding: 24px; }
#overlay.hidden { display: none; }
#ov-icon { font-size: 30px; }
#ov-msg { font-size: 16px; color: #1a1916; max-width: 400px; line-height: 1.5; }
#ov-sub { font-size: 12px; color: #888; max-width: 360px; }
#ov-bar { width: 220px; height: 4px; background: #ddd; border-radius: 2px; overflow: hidden; }
#ov-bar-inner { height: 100%; background: #2d5fa6; width: 0%; transition: width 0.3s; }
.lpop-name { font-weight: 600; font-size: 13px; margin-bottom: 5px; line-height: 1.3; }
.lpop-row { font-size: 12px; color: #666; margin: 2px 0; }
.lpop-sum { font-size: 14px; font-weight: 600; color: #2d5fa6; margin-top: 7px; padding-top: 7px; border-top: 1px solid #eee; }
.lpop-tag { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 20px; margin-top: 5px; color: #fff; }
</style>
</head>
<body>

<div id="overlay">
  <div id="ov-icon">🗺️</div>
  <div id="ov-msg">Käynnistetään...</div>
  <div id="ov-sub"></div>
  <div id="ov-bar"><div id="ov-bar-inner"></div></div>
</div>

<div id="shell">
  <div id="topbar">
    <h1>Salon kaupungin ostolaskut 2024</h1>
    <span class="pill" id="p-yrit">–</span>
    <span class="pill" id="p-sum">–</span>
    <span class="pill" id="p-geo">–</span>
    <span class="pill" id="p-nyt">–</span>
    <div class="spacer"></div>
    <span style="font-size:11px;color:#bbb">avoindata.suomi.fi · PRH · Photon/Komoot</span>
  </div>
  <div id="pbar"><div id="pbar-inner"></div></div>
  <div id="body">
    <div id="sidebar">
      <div>
        <div class="sb-title">Toimiala</div>
        <select id="sel-ta"><option value="">Kaikki</option></select>
      </div>
      <div>
        <div class="sb-title">Minimisumma</div>
        <select id="sel-min">
          <option value="0">Kaikki summat</option>
          <option value="1000">yli 1 000 €</option>
          <option value="5000">yli 5 000 €</option>
          <option value="10000">yli 10 000 €</option>
          <option value="50000">yli 50 000 €</option>
          <option value="100000">yli 100 000 €</option>
        </select>
      </div>
      <div>
        <div class="sb-title">Asetukset</div>
        <div class="tog-row">
          <span>Ryhmittele pisteet</span>
          <label class="tog">
            <input type="checkbox" id="tog-cluster" checked>
            <div class="tog-track"></div>
            <div class="tog-thumb"></div>
          </label>
        </div>
      </div>
      <div>
        <div class="sb-title">Toimialalegenda <span style="font-size:10px;color:#bbb">(klikkaa piilottaaksesi)</span></div>
        <div id="leg"></div>
        <div class="leg-sizes">
          <svg width="50" height="14">
            <circle cx="5"  cy="7" r="3" fill="#888" opacity="0.6"/>
            <circle cx="19" cy="7" r="5" fill="#888" opacity="0.6"/>
            <circle cx="36" cy="7" r="7" fill="#888" opacity="0.6"/>
          </svg>
          = laskun koko
        </div>
      </div>
      <div style="margin-top:auto;font-size:10px;color:#bbb;line-height:1.7">
        PRH-haku + geokoodaus kestää noin 2 minuuttia.<br>
        Lähde: CC BY 4.0 · Salon kaupunki
      </div>
    </div>
    <div id="map"></div>
  </div>
  <div id="infobar"><span id="info-txt">Odota...</span></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>

var TOIMIALAT = [
  { key: 'Rakentaminen',          color: '#c0392b', words: ['rakennus','rakentami','maarakennus','purkaminen','talonrakennus','infrarakennus'] },
  { key: 'Terveys ja sosiaali',   color: '#27ae60', words: ['terveys','sosiaali','hoito','lääkinnäl','hammas','psyk','vanhus','kuntoutus','sairaanho'] },
  { key: 'Koulutus',              color: '#8e44ad', words: ['koulu','opetus','koulutus','päiväkoti','varhais','oppilaitos'] },
  { key: 'Kauppa',                color: '#e67e22', words: ['kauppa','myynti','tukku','vähittäis'] },
  { key: 'Kuljetus',              color: '#d45a8a', words: ['kuljetus','liikenne','logistiikka','varastointi','posti','taksi'] },
  { key: 'Kiinteistö ja siivous', color: '#2980b9', words: ['kiinteistö','isännöi','vuokraus','siivous','puhtaanapito','tilapalvelu'] },
  { key: 'Teollisuus',            color: '#16a085', words: ['valmistus','teollisuus','elintarvike','metalli','paperi','puu','muovi','kone'] },
  { key: 'IT ja viestintä',       color: '#2c3e50', words: ['tietojenkäsittely','ohjelmisto','it-','ict','tietoliikenne','viestintä','digitaal'] },
  { key: 'Energia ja vesi',       color: '#f39c12', words: ['energia','sähkö','lämpö','vesi','jäte','ympäristö'] },
  { key: 'Hallinto',              color: '#7f8c8d', words: ['hallinto','julkinen','lakiasiain','tili','henkilöstö','konsultointi','asiantuntija','suunnittelu','arkkitehti'] },
  { key: 'Muu',                   color: '#95a5a6', words: [] }
];

function getToimiala(s) {
  if (s) {
    var l = s.toLowerCase();
    for (var i = 0; i < TOIMIALAT.length - 1; i++) {
      var t = TOIMIALAT[i];
      for (var j = 0; j < t.words.length; j++) {
        if (l.indexOf(t.words[j]) !== -1) return t;
      }
    }
  }
  return TOIMIALAT[TOIMIALAT.length - 1];
}

function getRadius(sum) {
  if (sum < 2000)   return 5;
  if (sum < 10000)  return 7;
  if (sum < 50000)  return 10;
  if (sum < 200000) return 14;
  if (sum < 500000) return 19;
  return 25;
}

function toEuro(n) {
  return n.toLocaleString('fi-FI', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 });
}

function setMsg(msg, sub) {
  document.getElementById('ov-msg').textContent = msg;
  document.getElementById('ov-sub').textContent = sub || '';
}

function setPct(p) {
  document.getElementById('ov-bar-inner').style.width = p + '%';
  document.getElementById('pbar-inner').style.width = p + '%';
}

var map, clusterGroup;
var allData = [];
var activeKeys = {};
var prhCache = {};
var geoCache = {};

// Asetetaan kaikki toimialat aktiivisiksi aluksi
for (var i = 0; i < TOIMIALAT.length; i++) {
  activeKeys[TOIMIALAT[i].key] = true;
}

function initMap() {
  map = L.map('map').setView([60.385, 23.129], 10);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);
  clusterGroup = L.markerClusterGroup({ maxClusterRadius: 50 });
  map.addLayer(clusterGroup);
}

function redraw() {
  clusterGroup.clearLayers();
  var minSum = parseFloat(document.getElementById('sel-min').value) || 0;
  var selTa  = document.getElementById('sel-ta').value;
  var nakyy  = 0;

  for (var i = 0; i < allData.length; i++) {
    var d = allData[i];
    if (!d.coords) continue;
    if (d.sum < minSum) continue;
    if (selTa && d.ta.key !== selTa) continue;
    if (!activeKeys[d.ta.key]) continue;
    nakyy++;

    var m = L.circleMarker([d.coords.lat, d.coords.lng], {
      radius:      getRadius(d.sum),
      fillColor:   d.ta.color,
      color:       '#ffffff',
      weight:      1.5,
      opacity:     1,
      fillOpacity: 0.78
    });
    m.bindPopup(
      '<div class="lpop-name">' + (d.nimi || '–') + '</div>' +
      '<div class="lpop-row">Y-tunnus: ' + d.yid + '</div>' +
      '<div class="lpop-row">Toimiala: ' + (d.taStr || '–') + '</div>' +
      '<div class="lpop-row">Osoite: ' + (d.osoite || '–') + '</div>' +
      '<div class="lpop-row">Laskuja: ' + d.lkm + ' kpl</div>' +
      '<div class="lpop-sum">' + toEuro(d.sum) + '</div>' +
      '<div><span class="lpop-tag" style="background:' + d.ta.color + '">' + d.ta.key + '</span></div>',
      { maxWidth: 280 }
    );
    clusterGroup.addLayer(m);
  }

  var geoLkm = 0;
  for (var j = 0; j < allData.length; j++) { if (allData[j].coords) geoLkm++; }
  document.getElementById('p-nyt').textContent = nakyy + ' kartalla';
  document.getElementById('info-txt').textContent = nakyy + ' yritystä näkyvissä · ' + geoLkm + ' paikannettua yhteensä';
}

function buildLegend() {
  var present = {};
  for (var i = 0; i < allData.length; i++) {
    present[allData[i].ta.key] = true;
  }

  var legEl = document.getElementById('leg');
  legEl.innerHTML = '';

  var sel = document.getElementById('sel-ta');
  var cur = sel.value;
  sel.innerHTML = '<option value="">Kaikki</option>';

  for (var j = 0; j < TOIMIALAT.length; j++) {
    var t = TOIMIALAT[j];
    if (!present[t.key]) continue;

    (function(ta) {
      var row = document.createElement('div');
      row.className = 'leg-row' + (activeKeys[ta.key] ? '' : ' dim');
      row.dataset.key = ta.key;
      row.innerHTML = '<div class="leg-dot" style="background:' + ta.color + '"></div><span>' + ta.key + '</span>';
      row.onclick = function() {
        activeKeys[ta.key] = !activeKeys[ta.key];
        row.classList.toggle('dim', !activeKeys[ta.key]);
        redraw();
      };
      legEl.appendChild(row);
    })(t);

    var opt = document.createElement('option');
    opt.value = t.key;
    opt.textContent = t.key;
    sel.appendChild(opt);
  }
  if (cur) sel.value = cur;
}

async function loadExcel() {
  setMsg('Ladataan ostolaskudata...', 'Noin 38 Mt — odota hetki');
  setPct(3);
  var url = 'https://avoindata.suomi.fi/data/dataset/36d08676-a7f9-4345-8ad3-028281ebc1cb/resource/937c24d0-6c32-4c23-ad12-e418ac0a6c42/download/salon-kaupungin-ostolaskut-ajalta-1.1.-31.12.2024.xlsx';
  var resp = await fetch(url);
  if (!resp.ok) throw new Error('Excel-lataus epäonnistui: HTTP ' + resp.status);
  var buf = await resp.arrayBuffer();
  setPct(22);
  setMsg('Luetaan Excel-tiedostoa...');
  var wb = XLSX.read(buf, { type: 'array' });
  var ws = wb.Sheets[wb.SheetNames[0]];
  return XLSX.utils.sheet_to_json(ws, { defval: '' });
}

function aggregate(rows) {
  var m = {};
  for (var i = 0; i < rows.length; i++) {
    var r   = rows[i];
    var yid = String(r['Y-tunnus'] || r['Ytunnus'] || r['y-tunnus'] || r['ytunnus'] || '').trim().replace(/\s/g, '');
    if (!yid || yid.length < 5 || yid === '-') continue;
    var nimi = String(r['Toimittajan nimi'] || r['Toimittaja'] || r['Nimi'] || r['nimi'] || '').trim();
    var raw  = String(r['Summa'] || r['summa'] || r['Laskun summa'] || r['Nettosumma'] || 0).replace(',', '.').replace(/\s/g, '');
    var sum  = parseFloat(raw) || 0;
    var ta   = String(r['Toimiala'] || r['toimiala'] || '').trim();
    if (!m[yid]) m[yid] = { yid: yid, nimi: nimi, sum: 0, lkm: 0, taRivi: ta };
    m[yid].sum += sum;
    m[yid].lkm++;
  }
  var arr = [];
  for (var k in m) arr.push(m[k]);
  arr.sort(function(a, b) { return b.sum - a.sum; });
  return arr;
}

async function fetchPRH(yid) {
  if (prhCache[yid] !== undefined) return prhCache[yid];
  try {
    var r = await fetch('https://avoindata.prh.fi/opendata-ytj-api/v3/companies?businessId=' + encodeURIComponent(yid));
    if (!r.ok) { prhCache[yid] = null; return null; }
    var d = await r.json();
    var c = d.results && d.results[0];
    if (!c) { prhCache[yid] = null; return null; }
    var addr = null;
    if (c.addresses) {
      for (var i = 0; i < c.addresses.length; i++) { if (c.addresses[i].type === 2) { addr = c.addresses[i]; break; } }
      if (!addr && c.addresses.length) addr = c.addresses[0];
    }
    var street = (addr && addr.street) || '';
    var post   = (addr && addr.postCode) || '';
    var city   = '';
    if (addr && addr.postOffices && addr.postOffices.length) {
      for (var j = 0; j < addr.postOffices.length; j++) {
        if (addr.postOffices[j].languageCode === 'FI') { city = addr.postOffices[j].postOffice; break; }
      }
      if (!city) city = addr.postOffices[0].postOffice || '';
    }
    var osoite = [street, post, city].filter(Boolean).join(', ');
    var ta = '';
    if (c.mainBusinessLine && c.mainBusinessLine.descriptions) {
      var descs = c.mainBusinessLine.descriptions;
      for (var k = 0; k < descs.length; k++) { if (descs[k].languageCode === 'FI') { ta = descs[k].description; break; } }
      if (!ta && descs.length) ta = descs[0].description || '';
    }
    var nimi = (c.names && c.names[0] && c.names[0].name) || '';
    prhCache[yid] = { nimi: nimi, osoite: osoite, ta: ta };
  } catch(e) { prhCache[yid] = null; }
  return prhCache[yid];
}

async function geocode(osoite) {
  if (!osoite) return null;
  if (geoCache[osoite] !== undefined) return geoCache[osoite];
  try {
    var q = encodeURIComponent(osoite + ' Finland');
    var r = await fetch('https://photon.komoot.io/api/?q=' + q + '&limit=1&lang=fi&bbox=19.0,59.5,32.0,70.5');
    var d = await r.json();
    if (d.features && d.features.length > 0) {
      var coords = d.features[0].geometry.coordinates;
      geoCache[osoite] = { lat: coords[1], lng: coords[0] };
      return geoCache[osoite];
    }
  } catch(e) {}
  geoCache[osoite] = null;
  return null;
}

async function main() {
  try {
    var rows     = await loadExcel();
    var yritykset = aggregate(rows);
    var totalSum = 0;
    for (var i = 0; i < yritykset.length; i++) totalSum += yritykset[i].sum;
    document.getElementById('p-yrit').textContent = yritykset.length + ' yritystä';
    document.getElementById('p-sum').textContent  = toEuro(totalSum);
    setPct(28);

    var kohde = yritykset.slice(0, 100);
    var geo   = 0;
    setMsg('Haetaan tietoja PRH:lta...', '0 / ' + kohde.length);

    for (var i = 0; i < kohde.length; i++) {
      var y   = kohde[i];
      var prh = await fetchPRH(y.yid);
      if (prh) {
        y.nimi   = prh.nimi || y.nimi;
        y.osoite = prh.osoite;
        y.taStr  = prh.ta || y.taRivi;
      } else {
        y.osoite = '';
        y.taStr  = y.taRivi;
      }
      y.ta = getToimiala(y.taStr);

      if (y.osoite) {
        y.coords = await geocode(y.osoite);
        if (y.coords) geo++;
      }

      allData.push(y);
      setPct(28 + Math.round((i + 1) / kohde.length * 68));
      setMsg('Haetaan osoitteita... ' + (i + 1) + '/' + kohde.length, geo + ' paikannettu');
      document.getElementById('p-geo').textContent = geo + ' paikannettu';

      buildLegend();
      redraw();

      await new Promise(function(res) { setTimeout(res, 350); });
    }

    setPct(100);
    document.getElementById('overlay').classList.add('hidden');

  } catch(err) {
    document.getElementById('ov-icon').textContent = '⚠️';
    setMsg('Virhe: ' + err.message, 'Tarkista nettiyhteys ja päivitä sivu (F5)');
    console.error(err);
  }
}

window.addEventListener('load', function() {
  initMap();

  document.getElementById('sel-ta').addEventListener('change', redraw);
  document.getElementById('sel-min').addEventListener('change', redraw);
  document.getElementById('tog-cluster').addEventListener('change', function() {
    if (this.checked) {
      if (!map.hasLayer(clusterGroup)) map.addLayer(clusterGroup);
      redraw();
    } else {
      map.removeLayer(clusterGroup);
      var layers = clusterGroup.getLayers();
      for (var i = 0; i < layers.length; i++) map.addLayer(layers[i]);
    }
  });

  main();
});
</script>
</body>
</html>
